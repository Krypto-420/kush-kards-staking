
<!DOCTYPE html>
<html>
<head>
  <title>Kush Kards 🌿</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #065f46);
      color: white;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .card {
      background: #111;
      border: 1px solid #22c55e;
      border-radius: 12px;
      padding: 20px;
      margin: 15px;
      display: inline-block;
      width: 220px;
    }

    button {
      border: none;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      cursor: pointer;
      color: black;
      font-weight: bold;
      width: 100%;
    }

    .locked { background: #16a34a; }
    .unlocked { background: #4ade80; }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    .wallet-info {
      margin-top: 20px;
    }

    #stakedList {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #22c55e;
      border-radius: 10px;
      background: #0f172a;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🌿 Kush Kards Staking</h1>
  <p>Choose your staking strategy. Earn $SEEDS.</p>

  <div class="card">
    <h3>🔒 15 Day Lock</h3>
    <p>1.5x Rewards</p>
    <button id="stake15" class="locked" onclick="startStake('15', 15, 1.5)">Stake 15 Days</button>
    <p id="timer15"></p>
  </div>

  <div class="card">
    <h3>🔒 30 Day Lock</h3>
    <p>2x Rewards</p>
    <button id="stake30" class="locked" onclick="startStake('30', 30, 2)">Stake 30 Days</button>
    <p id="timer30"></p>
  </div>

  <div class="card">
    <h3>🔓 Flexible</h3>
    <p>1x Rewards</p>
    <button class="unlocked" onclick="flexStake()">Flexible Stake</button>
  </div>

  <h2 id="rewards">$SEEDS Earned: 420</h2>
  <button onclick="claimRewards()">Claim Rewards</button>

  <!-- STAKED NFT DISPLAY -->
  <div id="stakedList">
    <h3>📦 Currently Staked</h3>
    <div id="stakedItems">None</div>
  </div>

  <!-- Wallet -->
  <div class="wallet-info">
    <button id="connectSolana">Connect Solana Wallet</button>
    <div id="walletAddress"></div>
    <div id="walletBalance"></div>
    <div id="solTicker">Loading SOL price...</div>
  </div>
</div>

<!-- SOLANA -->
<script type="module">
  import { PhantomWalletAdapter } from "https://cdn.jsdelivr.net/npm/@solana/wallet-adapter-wallets/dist/index.js";
  import { Connection, clusterApiUrl, LAMPORTS_PER_SOL } from "https://cdn.jsdelivr.net/npm/@solana/web3.js@1.73.0/dist/index.min.js";

  const wallet = new PhantomWalletAdapter();
  const connection = new Connection(clusterApiUrl("mainnet-beta"));

  document.getElementById("connectSolana").onclick = async () => {
    await wallet.connect();
    document.getElementById("walletAddress").innerText =
      "Solana: " + wallet.publicKey.toString();

    const bal = await connection.getBalance(wallet.publicKey);
    document.getElementById("walletBalance").innerText =
      "Balance: " + (bal / LAMPORTS_PER_SOL).toFixed(4) + " SOL";
  };

  async function updateSOLPrice() {
    const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd");
    const data = await res.json();
    document.getElementById("solTicker").innerText =
      "SOL Price: $" + data.solana.usd;
  }

  updateSOLPrice();
  setInterval(updateSOLPrice, 15000);
</script>

<!-- STAKING SYSTEM -->
<script>
  let totalRewards = 420;
  let stakes = JSON.parse(localStorage.getItem("stakes")) || {};

  function save() {
    localStorage.setItem("stakes", JSON.stringify(stakes));
  }

  function startStake(id, days, multiplier) {
    const endTime = Date.now() + days * 24 * 60 * 60 * 1000;

    stakes[id] = {
      end: endTime,
      multiplier
    };

    save();
    updateUI();
  }

  function flexStake() {
    totalRewards += 10;
    updateRewards();
    alert("Flexible staking 🌿 +10 SEEDS");
  }

  function updateRewards() {
    document.getElementById("rewards").innerText =
      "$SEEDS Earned: " + totalRewards.toFixed(2);
  }

  function claimRewards() {
    alert("Claimed " + totalRewards + " SEEDS 🌿");
    totalRewards = 0;
    updateRewards();
  }

  function updateUI() {
    let list = "";

    ["15", "30"].forEach(id => {
      const stake = stakes[id];
      const btn = document.getElementById("stake" + id);
      const timer = document.getElementById("timer" + id);

      if (stake) {
        const timeLeft = stake.end - Date.now();

        if (timeLeft > 0) {
          btn.disabled = true;

          const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
          const hours = Math.floor((timeLeft / (1000 * 60 * 60)) % 24);

          timer.innerText = `⏳ ${days}d ${hours}h remaining`;
          list += `<p>🔒 ${id}-Day Lock Active</p>`;
        } else {
          btn.disabled = false;
          timer.innerText = "✅ Ready to claim";
          totalRewards += 100 * stake.multiplier;
          delete stakes[id];
          save();
        }
      }
    });

    document.getElementById("stakedItems").innerHTML =
      list || "None";
  }

  setInterval(updateUI, 1000);
  updateUI();
  updateRewards();
</script>

</body>
</html>
