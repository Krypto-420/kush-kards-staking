<!DOCTYPE html>
<html>
<head>
  <title>Kush Kards 🌿</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #065f46);
      color: white;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .card {
      background: #111;
      border: 1px solid #22c55e;
      border-radius: 10px;
      padding: 15px;
      margin: 10px;
      display: inline-block;
      width: 200px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      cursor: pointer;
      color: black;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🌿 Kush Kards Staking</h1>

  <p>Stake your NFTs. Earn $SEEDS. Grow your stash.</p>

  <div class="card">
    <h3>OG Blaze #1</h3>
    <p>🔥 Potency: 85</p>
    <button>Stake</button>
  </div>

  <div class="card">
    <h3>Rainbow Kush #2</h3>
    <p>🌈 Potency: 120</p>
    <button>Stake</button>
  </div>

  <h2>$SEEDS Earned: 420</h2>

  <button>Claim Rewards</button>

</div>

</body>
</html>
