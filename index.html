
<!DOCTYPE html>
<html>
<head>
  <title>Kush Kards 🌿</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #065f46);
      color: white;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .card {
      background: #111;
      border: 1px solid #22c55e;
      border-radius: 12px;
      padding: 15px;
      margin: 10px;
      display: inline-block;
      width: 180px;
      cursor: pointer;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
    }

    #nftContainer, #stakedContainer {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🌿 Kush Kards Staking</h1>

  <button id="connectSolana">Connect Wallet</button>
  <p id="walletAddress"></p>

  <h2>🖼 Your NFTs</h2>
  <div id="nftContainer">Connect wallet to load NFTs...</div>

  <h2>📦 Staked NFTs</h2>
  <div id="stakedContainer">None</div>
</div>

<script>
let walletAddress = null;
let stakedNFTs = JSON.parse(localStorage.getItem("stakedNFTs")) || [];

// CONNECT WALLET
document.getElementById("connectSolana").onclick = async () => {
  if (window.solana && window.solana.isPhantom) {
    const res = await window.solana.connect();
    walletAddress = res.publicKey.toString();
    document.getElementById("walletAddress").innerText = walletAddress;
    loadNFTs();
    renderStaked();
  } else {
    alert("Install Phantom Wallet");
  }
};

// FETCH NFTS (Helius API)
async function loadNFTs() {
  const container = document.getElementById("nftContainer");
  container.innerHTML = "Loading NFTs...";

  const url = `https://api.helius.xyz/v0/addresses/${walletAddress}/nfts?api-key=2d4b732f-087f-4dc0-8dff-a59302c1ef43`;

  try {
    const res = await fetch(url);
    const nfts = await res.json();

    container.innerHTML = "";

    nfts.forEach(nft => {
      const img = nft.content?.links?.image || "";

      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <img src="${img}" />
        <p>${nft.content.metadata.name}</p>
        <button onclick='stakeNFT(${JSON.stringify(nft)})'>Stake</button>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    container.innerHTML = "Error loading NFTs";
  }
}

// STAKE NFT
function stakeNFT(nft) {
  stakedNFTs.push(nft);
  localStorage.setItem("stakedNFTs", JSON.stringify(stakedNFTs));
  renderStaked();
}

// SHOW STAKED NFTS
function renderStaked() {
  const container = document.getElementById("stakedContainer");

  if (stakedNFTs.length === 0) {
    container.innerHTML = "None";
    return;
  }

  container.innerHTML = "";

  stakedNFTs.forEach(nft => {
    const img = nft.content?.links?.image || "";

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <img src="${img}" />
      <p>${nft.content.metadata.name}</p>
      <button onclick='unstakeNFT("${nft.id}")'>Unstake</button>
    `;

    container.appendChild(div);
  });
}

// UNSTAKE
function unstakeNFT(id) {
  stakedNFTs = stakedNFTs.filter(n => n.id !== id);
  localStorage.setItem("stakedNFTs", JSON.stringify(stakedNFTs));
  renderStaked();
}
</script>

</body>
</html>
