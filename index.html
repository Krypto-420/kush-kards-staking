
<!DOCTYPE html>
<html>
<head>
  <title>Kush Kards 🌿</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #065f46);
      color: white;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .card {
      background: #111;
      border: 1px solid #22c55e;
      border-radius: 10px;
      padding: 15px;
      margin: 10px;
      display: inline-block;
      width: 220px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 8px;
      margin-top: 6px;
      border-radius: 5px;
      cursor: pointer;
      color: black;
      font-weight: bold;
      width: 100%;
    }

    button:hover {
      background: #16a34a;
    }

    .locked {
      background: #16a34a;
    }

    .unlocked {
      background: #4ade80;
    }

    .wallet-info {
      margin-top: 20px;
      font-weight: bold;
      font-size: 16px;
    }

    #solTicker {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🌿 Kush Kards Staking</h1>
  <p>Stake your NFTs. Earn $SEEDS. Grow your stash.</p>

  <!-- CARD 1 -->
  <div class="card">
    <h3>OG Blaze #1</h3>
    <p>🔥 Potency: 85</p>

    <button class="locked" onclick="stake('OG Blaze #1', '15 Days Locked', 1.5)">
      🔒 Stake 15 Days (1.5x Rewards)
    </button>

    <button class="locked" onclick="stake('OG Blaze #1', '30 Days Locked', 2)">
      🔒 Stake 30 Days (2x Rewards)
    </button>

    <button class="unlocked" onclick="stake('OG Blaze #1', 'Flexible', 1)">
      🔓 Flexible Staking (1x Rewards)
    </button>
  </div>

  <!-- CARD 2 -->
  <div class="card">
    <h3>Rainbow Kush #2</h3>
    <p>🌈 Potency: 120</p>

    <button class="locked" onclick="stake('Rainbow Kush #2', '15 Days Locked', 1.5)">
      🔒 Stake 15 Days (1.5x Rewards)
    </button>

    <button class="locked" onclick="stake('Rainbow Kush #2', '30 Days Locked', 2)">
      🔒 Stake 30 Days (2x Rewards)
    </button>

    <button class="unlocked" onclick="stake('Rainbow Kush #2', 'Flexible', 1)">
      🔓 Flexible Staking (1x Rewards)
    </button>
  </div>

  <h2 id="rewards">$SEEDS Earned: 420</h2>
  <button onclick="claimRewards()">Claim Rewards</button>

  <!-- Wallet Section -->
  <div class="wallet-info">
    <button id="connectSolana">Connect Solana Wallet</button>
    <div id="walletAddress"></div>
    <div id="walletBalance"></div>
    <div id="solTicker">Loading SOL price...</div>
  </div>
</div>

<!-- Scripts -->
<script type="module">
  import { PhantomWalletAdapter } from "https://cdn.jsdelivr.net/npm/@solana/wallet-adapter-wallets/dist/index.js";
  import { Connection, clusterApiUrl, LAMPORTS_PER_SOL } from "https://cdn.jsdelivr.net/npm/@solana/web3.js@1.73.0/dist/index.min.js";

  const wallet = new PhantomWalletAdapter();
  const connection = new Connection(clusterApiUrl("mainnet-beta"));

  async function updateBalance() {
    if (wallet.publicKey) {
      const balanceLamports = await connection.getBalance(wallet.publicKey);
      const balanceSOL = balanceLamports / LAMPORTS_PER_SOL;
      document.getElementById("walletBalance").innerText = "Balance: " + balanceSOL.toFixed(4) + " SOL";
    }
  }

  document.getElementById("connectSolana").addEventListener("click", async () => {
    try {
      await wallet.connect();
      document.getElementById("walletAddress").innerText = "Solana: " + wallet.publicKey.toString();
      await updateBalance();
    } catch (err) {
      console.log(err);
      alert("Failed to connect Solana wallet");
    }
  });

  async function updateSOLPrice() {
    try {
      const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd");
      const data = await res.json();
      document.getElementById("solTicker").innerText = "SOL Price: $" + data.solana.usd;
    } catch (err) {
      document.getElementById("solTicker").innerText = "Error fetching price";
    }
  }

  updateSOLPrice();
  setInterval(updateSOLPrice, 15000);
</script>

<!-- Staking Logic -->
<script>
  let totalRewards = 420;

  function stake(cardName, type, multiplier) {
    const baseReward = 10; // base per stake click (demo)
    const earned = baseReward * multiplier;

    totalRewards += earned;

    document.getElementById("rewards").innerText =
      "$SEEDS Earned: " + totalRewards.toFixed(2);

    alert(cardName + " staked with " + type + " 🌿\nEarned +" + earned + " SEEDS");
  }

  function claimRewards() {
    alert("Rewards claimed: " + totalRewards.toFixed(2) + " $SEEDS 🌿");
    totalRewards = 0;
    document.getElementById("rewards").innerText = "$SEEDS Earned: 0";
  }
</script>

</body>
</html>
