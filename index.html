
<!DOCTYPE html>
<html>
<head>
  <title>Kush Kards 🌿</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #065f46);
      color: white;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .card {
      background: #111;
      border: 1px solid #22c55e;
      border-radius: 12px;
      padding: 20px;
      margin: 15px;
      display: inline-block;
      width: 220px;
    }

    button {
      border: none;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      cursor: pointer;
      color: black;
      font-weight: bold;
      width: 100%;
    }

    .locked {
      background: #16a34a;
    }

    .unlocked {
      background: #4ade80;
    }

    button:hover {
      opacity: 0.9;
    }

    .wallet-info {
      margin-top: 20px;
      font-weight: bold;
    }

    #solTicker {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🌿 Kush Kards Staking</h1>
  <p>Choose your staking strategy. Earn $SEEDS.</p>

  <!-- 15 DAY LOCK -->
  <div class="card">
    <h3>🔒 15 Day Lock</h3>
    <p>Earn 1.5x rewards</p>
    <button class="locked" onclick="stake('15 Day Lock', 1.5)">
      Stake 15 Days
    </button>
  </div>

  <!-- 30 DAY LOCK -->
  <div class="card">
    <h3>🔒 30 Day Lock</h3>
    <p>Earn 2x rewards</p>
    <button class="locked" onclick="stake('30 Day Lock', 2)">
      Stake 30 Days
    </button>
  </div>

  <!-- FLEXIBLE -->
  <div class="card">
    <h3>🔓 Flexible</h3>
    <p>Earn 1x rewards (no lock)</p>
    <button class="unlocked" onclick="stake('Flexible', 1)">
      Flexible Stake
    </button>
  </div>

  <h2 id="rewards">$SEEDS Earned: 420</h2>
  <button onclick="claimRewards()">Claim Rewards</button>

  <!-- Wallet Section -->
  <div class="wallet-info">
    <button id="connectSolana">Connect Solana Wallet</button>
    <div id="walletAddress"></div>
    <div id="walletBalance"></div>
    <div id="solTicker">Loading SOL price...</div>
  </div>
</div>

<!-- Solana Scripts -->
<script type="module">
  import { PhantomWalletAdapter } from "https://cdn.jsdelivr.net/npm/@solana/wallet-adapter-wallets/dist/index.js";
  import { Connection, clusterApiUrl, LAMPORTS_PER_SOL } from "https://cdn.jsdelivr.net/npm/@solana/web3.js@1.73.0/dist/index.min.js";

  const wallet = new PhantomWalletAdapter();
  const connection = new Connection(clusterApiUrl("mainnet-beta"));

  async function updateBalance() {
    if (wallet.publicKey) {
      const balanceLamports = await connection.getBalance(wallet.publicKey);
      const balanceSOL = balanceLamports / LAMPORTS_PER_SOL;
      document.getElementById("walletBalance").innerText =
        "Balance: " + balanceSOL.toFixed(4) + " SOL";
    }
  }

  document.getElementById("connectSolana").addEventListener("click", async () => {
    try {
      await wallet.connect();
      document.getElementById("walletAddress").innerText =
        "Solana: " + wallet.publicKey.toString();
      await updateBalance();
    } catch (err) {
      alert("Failed to connect wallet");
    }
  });

  async function updateSOLPrice() {
    try {
      const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd");
      const data = await res.json();
      document.getElementById("solTicker").innerText =
        "SOL Price: $" + data.solana.usd;
    } catch {
      document.getElementById("solTicker").innerText = "Price error";
    }
  }

  updateSOLPrice();
  setInterval(updateSOLPrice, 15000);
</script>

<!-- Staking Logic -->
<script>
  let totalRewards = 420;

  function stake(type, multiplier) {
    const base = 10;
    const earned = base * multiplier;

    totalRewards += earned;

    document.getElementById("rewards").innerText =
      "$SEEDS Earned: " + totalRewards.toFixed(2);

    alert(type + " activated 🌿\n+" + earned + " SEEDS");
  }

  function claimRewards() {
    alert("Claimed " + totalRewards.toFixed(2) + " $SEEDS 🌿");
    totalRewards = 0;
    document.getElementById("rewards").innerText = "$SEEDS Earned: 0";
  }
</script>

</body>
</html>
