
<!DOCTYPE html>
<html>
<head>
  <title>Kush Kards 🌿</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #065f46);
      color: white;
      text-align: center;
    }

    .container { padding: 20px; }

    .card {
      background: #111;
      border: 1px solid #22c55e;
      border-radius: 12px;
      padding: 15px;
      margin: 10px;
      display: inline-block;
      width: 200px;
    }

    img { width: 100%; border-radius: 10px; }

    button {
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🌿 Kush Kards Staking</h1>

  <button id="connectBtn">Connect Wallet</button>
  <p id="wallet"></p>

  <h2>🖼 Your NFTs</h2>
  <div id="nfts">Connect wallet...</div>

  <h2>📦 Staked NFTs</h2>
  <div id="staked">None</div>

  <h2>💰 Rewards: <span id="rewards">0</span> SEEDS</h2>
  <button onclick="claim()">Claim Rewards</button>

  <h2>⏳ Lock Staking</h2>
  <button onclick="lockStake(15,1.5)">15 Days (1.5x)</button>
  <button onclick="lockStake(30,2)">30 Days (2x)</button>

  <p id="timer"></p>
</div>

<script>
let wallet = null;
let nfts = [];
let staked = JSON.parse(localStorage.getItem("staked")) || [];
let rewards = 0;
let lock = JSON.parse(localStorage.getItem("lock")) || null;

// CONNECT WALLET
document.getElementById("connectBtn").onclick = async () => {
  if (!window.solana || !window.solana.isPhantom) {
    alert("Install Phantom Wallet");
    return;
  }

  const res = await window.solana.connect();
  wallet = res.publicKey.toString();
  document.getElementById("wallet").innerText = wallet;

  loadNFTs();
  renderStaked();
};

// LOAD NFTS
async function loadNFTs() {
  const container = document.getElementById("nfts");
  container.innerHTML = "Loading...";

  try {
    const res = await fetch(
      `https://api.helius.xyz/v0/addresses/${wallet}/nfts?api-key=YOUR_API_KEY`
    );
    nfts = await res.json();

    container.innerHTML = "";

    nfts.forEach((nft, i) => {
      const img = nft.content?.links?.image || "";
      const name = nft.content?.metadata?.name || "Unnamed";

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${img}">
        <p>${name}</p>
        <button onclick="stake(${i})">Stake</button>
      `;

      container.appendChild(div);
    });

  } catch {
    container.innerHTML = "Error loading NFTs";
  }
}

// STAKE NFT
function stake(i) {
  staked.push(nfts[i]);
  localStorage.setItem("staked", JSON.stringify(staked));
  renderStaked();
}

// RENDER STAKED
function renderStaked() {
  const container = document.getElementById("staked");

  if (staked.length === 0) {
    container.innerHTML = "None";
    return;
  }

  container.innerHTML = "";

  staked.forEach((nft, i) => {
    const img = nft.content?.links?.image || "";
    const name = nft.content?.metadata?.name || "NFT";

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${img}">
      <p>${name}</p>
      <button onclick="unstake(${i})">Unstake</button>
    `;

    container.appendChild(div);
  });
}

// UNSTAKE
function unstake(i) {
  staked.splice(i,1);
  localStorage.setItem("staked", JSON.stringify(staked));
  renderStaked();
}

// LOCK STAKING
function lockStake(days, mult) {
  lock = {
    end: Date.now() + days * 86400000,
    mult
  };
  localStorage.setItem("lock", JSON.stringify(lock));
}

// TIMER + REWARDS
setInterval(() => {
  if (!lock) return;

  const left = lock.end - Date.now();

  if (left > 0) {
    const d = Math.floor(left / 86400000);
    const h = Math.floor((left / 3600000) % 24);
    document.getElementById("timer").innerText =
      `⏳ ${d}d ${h}h remaining`;
  } else {
    rewards += 100 * lock.mult;
    document.getElementById("rewards").innerText = rewards;
    lock = null;
    localStorage.removeItem("lock");
    document.getElementById("timer").innerText = "✅ Complete";
  }
}, 1000);

// CLAIM
function claim() {
  alert("Claimed " + rewards + " SEEDS 🌿");
  rewards = 0;
  document.getElementById("rewards").innerText = rewards;
}
</script>

</body>
</html>
